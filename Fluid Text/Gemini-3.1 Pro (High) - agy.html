<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICHAEL Particle Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0d0d12;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let mouse = { x: -1000, y: -1000, radius: 100 };
        
        // Physics constants
        const springK = 0.05;
        const damping = 0.85;
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            initParticles();
        }

        function initParticles() {
            particles = [];
            
            // Create an offscreen canvas to render the text
            const offscreen = document.createElement('canvas');
            const oCtx = offscreen.getContext('2d', { willReadFrequently: true });
            
            // Use a large bold font to get enough pixel density
            const fontSize = Math.min(width * 0.15, 180);
            oCtx.font = `900 ${fontSize}px "Inter", "Segoe UI", "Helvetica Neue", sans-serif`;
            
            const text = "MICHAEL";
            const textMetrics = oCtx.measureText(text);
            const textWidth = textMetrics.width;
            
            // Size the offscreen canvas exactly to the text dimensions to minimize loop overhead
            // Adding padding to ensure nothing is clipped
            offscreen.width = textWidth + 20; 
            offscreen.height = fontSize * 1.5;
            
            // Reset font after resizing canvas
            oCtx.font = `900 ${fontSize}px "Inter", "Segoe UI", "Helvetica Neue", sans-serif`;
            oCtx.fillStyle = 'white';
            oCtx.textAlign = 'center';
            oCtx.textBaseline = 'middle';
            oCtx.fillText(text, offscreen.width / 2, offscreen.height / 2);
            
            const imgData = oCtx.getImageData(0, 0, offscreen.width, offscreen.height);
            const data = imgData.data;
            
            // Step size controls the density of particles.
            const step = Math.max(Math.floor(fontSize / 30), 2);
            
            const startX = width / 2 - offscreen.width / 2;
            const startY = height / 2 - offscreen.height / 2;
            
            for (let y = 0; y < offscreen.height; y += step) {
                for (let x = 0; x < offscreen.width; x += step) {
                    const index = (y * offscreen.width + x) * 4;
                    const alpha = data[index + 3];
                    
                    if (alpha > 128) { // If pixel is mostly opaque
                        const tx = startX + x;
                        const ty = startY + y;
                        
                        // Scatter particles randomly at start
                        const initialX = Math.random() * width;
                        const initialY = Math.random() * height;
                        
                        // Subtle color variations (Cyan to Blue/Purple)
                        const hue = 180 + Math.random() * 80;
                        const color = `hsl(${hue}, 90%, 60%)`;
                        
                        particles.push({
                            x: initialX,
                            y: initialY,
                            tx: tx,
                            ty: ty,
                            vx: (Math.random() - 0.5) * 10,
                            vy: (Math.random() - 0.5) * 10,
                            baseX: tx,
                            baseY: ty,
                            color: color,
                            size: step * 0.7,
                            randomOffset: Math.random() * Math.PI * 2
                        });
                    }
                }
            }
        }
        
        function animate() {
            // Slight clear to leave a tiny trail (blur effect), but keep performance up
            ctx.fillStyle = '#0d0d12';
            ctx.fillRect(0, 0, width, height);
            
            const time = Date.now() * 0.002;
            
            // Global glow setting
            ctx.globalCompositeOperation = 'lighter';
            
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                
                // Breathing/floating motion
                // Modify target position slightly based on sine wave
                p.tx = p.baseX + Math.sin(time + p.randomOffset) * 2;
                p.ty = p.baseY + Math.cos(time + p.randomOffset) * 2;
                
                // Mouse interaction
                const dxMouse = mouse.x - p.x;
                const dyMouse = mouse.y - p.y;
                const distMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);
                
                if (distMouse < mouse.radius) {
                    // Calculate repulsion force
                    const force = (mouse.radius - distMouse) / mouse.radius;
                    const forceX = (dxMouse / distMouse) * force * -10;
                    const forceY = (dyMouse / distMouse) * force * -10;
                    
                    p.vx += forceX;
                    p.vy += forceY;
                }
                
                // Spring Physics
                const dx = p.tx - p.x;
                const dy = p.ty - p.y;
                
                // F = k*x
                let ax = dx * springK;
                let ay = dy * springK;
                
                // Update velocity with damping
                p.vx = (p.vx + ax) * damping;
                p.vy = (p.vy + ay) * damping;
                
                // Update position
                p.x += p.vx;
                p.y += p.vy;
                
                // Draw particle
                ctx.fillStyle = p.color;
                
                // Small individual glow
                ctx.shadowBlur = 8;
                ctx.shadowColor = p.color;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0; // Reset for performance
            
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        
        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });
        
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        init();
        animate();
    </script>
</body>
</html>
