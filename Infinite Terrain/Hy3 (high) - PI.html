<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ASCII Infinite Terrain</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #screen {
        display: block;
        position: fixed;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="screen"></canvas>
    <script>
      (function () {
        "use strict";
        const canvas = document.getElementById("screen");
        const ctx = canvas.getContext("2d");
        const MONO =
          'ui-monospace, Menlo, Consolas, "DejaVu Sans Mono", monospace';
        const fontSize = 16;
        let charW = 9.6,
          charH = 16,
          dpr = 1;
        let cols = 80,
          rows = 40;

        /* ============================================================
     1. PROCEDURAL NOISE  (implemented from scratch)
     ------------------------------------------------------------
     hash2 : deterministic integer hash -> [0,1]
     vnoise: 2D value noise with smoothstep interpolation
     fbm   : fractal Brownian motion (sum of octaves)
     ============================================================ */
        function hash2(x, y) {
          let h = Math.imul(x | 0, 374761393) ^ Math.imul(y | 0, 668265263);
          h = Math.imul(h ^ (h >>> 13), 1274126177);
          h ^= h >>> 16;
          return (h >>> 0) / 4294967295;
        }
        function fade(t) {
          return t * t * (3 - 2 * t);
        } // smoothstep
        function vnoise(x, y) {
          const x0 = Math.floor(x),
            y0 = Math.floor(y);
          const xf = x - x0,
            yf = y - y0;
          const u = fade(xf),
            v = fade(yf);
          const a = hash2(x0, y0),
            b = hash2(x0 + 1, y0);
          const c = hash2(x0, y0 + 1),
            d = hash2(x0 + 1, y0 + 1);
          const ab = a + (b - a) * u;
          const cd = c + (d - c) * u;
          return ab + (cd - ab) * v;
        }
        function fbm(x, y, oct, lac, gain) {
          let amp = 0.5,
            freq = 1,
            sum = 0,
            norm = 0;
          for (let i = 0; i < oct; i++) {
            sum += amp * vnoise(x * freq, y * freq);
            norm += amp;
            amp *= gain;
            freq *= lac;
          }
          return sum / norm;
        }

        /* ============================================================
     2. PALETTES + small helpers
     ============================================================ */
        const DAY_TOP = [40, 110, 190],
          DAY_HOR = [165, 205, 238];
        const NIGHT_TOP = [5, 9, 26],
          NIGHT_HOR = [16, 24, 52];
        const LAND_RAMP = " .:-=+*#%@"; // sparse surface -> dense core
        const CLOUD_RAMP = " .,:;oO0@";

        const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);
        const lerp = (a, b, t) => a + (b - a) * t;
        const lerpC = (a, b, t) => [
          lerp(a[0], b[0], t),
          lerp(a[1], b[1], t),
          lerp(a[2], b[2], t),
        ];
        const scaleC = (c, s) => [c[0] * s, c[1] * s, c[2] * s];
        // quantize to steps of 8 so neighbouring cells share a colour -> long draw runs
        function hex(c) {
          const q = (v) => clamp(Math.round(v / 8) * 8, 0, 255);
          const r = q(c[0]),
            g = q(c[1]),
            b = q(c[2]);
          return (
            "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)
          );
        }

        /* ============================================================
     3. LAYOUT (fills the viewport with a character grid)
     ============================================================ */
        let topRowF, elev;
        function resize() {
          dpr = window.devicePixelRatio || 1;
          canvas.style.width = window.innerWidth + "px";
          canvas.style.height = window.innerHeight + "px";
          canvas.width = Math.floor(window.innerWidth * dpr);
          canvas.height = Math.floor(window.innerHeight * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.font = fontSize + "px " + MONO;
          ctx.textBaseline = "top";
          charW = ctx.measureText("M").width;
          charH = fontSize; // line-height 1
          cols = Math.max(60, Math.floor(window.innerWidth / charW));
          rows = Math.max(30, Math.floor(window.innerHeight / charH));
          topRowF = new Float32Array(cols);
          elev = new Float32Array(cols);
        }
        window.addEventListener("resize", resize);
        resize();

        /* ============================================================
     4. ANIMATION STATE
     ============================================================ */
        let offset = 0; // world-x scroll offset (grows forever)
        let time = 0; // frame counter
        const DAY_FRAMES = 1800; // ~30s per full day/night cycle at 60fps

        function frame() {
          offset += 0.5; // horizontal fly speed (world cells / frame)
          time += 1;

          const phase = (time % DAY_FRAMES) / DAY_FRAMES;
          const daylight = 0.5 - 0.5 * Math.cos(phase * 2 * Math.PI); // 0 = midnight, 1 = noon

          const horizon = Math.floor(rows * 0.6);
          const relief = rows * 0.55;
          const waterRow = horizon;

          /* --- terrain heightline: one fBm sample per column (stable in world space) --- */
          for (let c = 0; c < cols; c++) {
            const wx = c + offset;
            const e = fbm(wx * 0.015, 0.5, 5, 2, 0.5); // [0,1]
            elev[c] = e;
            topRowF[c] = clamp(horizon - (e - 0.5) * 2 * relief, 2, rows - 2);
          }

          /* --- sky gradient (day/night modulated) drawn as the background --- */
          const skyTop = lerpC(NIGHT_TOP, DAY_TOP, daylight);
          const skyHor = lerpC(NIGHT_HOR, DAY_HOR, daylight);
          const grad = ctx.createLinearGradient(0, 0, 0, rows * charH);
          grad.addColorStop(0, hex(skyTop));
          grad.addColorStop(clamp(horizon / rows, 0, 1), hex(skyHor));
          grad.addColorStop(1, hex(skyHor));
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, cols * charW, rows * charH);

          /* --- celestial bodies (sun arcs by day, moon by night) --- */
          const sun = {
            x: phase * cols,
            y: horizon - Math.sin(phase * Math.PI) * rows * 0.45,
          };
          const mp = (phase + 0.5) % 1;
          const moon = {
            x: mp * cols,
            y: horizon - Math.sin(mp * Math.PI) * rows * 0.45,
          };
          const sunC = Math.round(sun.x),
            sunR = Math.round(sun.y);
          const moonC = Math.round(moon.x),
            moonR = Math.round(moon.y);
          const sunVis = daylight > 0.12;
          const moonVis = daylight < 0.9;
          const light = 0.4 + 0.6 * daylight; // global brightness for land/water/clouds

          ctx.textBaseline = "top";

          /* --- render the grid, batching consecutive same-colour cells into one fillText --- */
          for (let r = 0; r < rows; r++) {
            const y = r * charH;
            let runStr = "",
              runCol = null,
              runX = 0;
            const flush = () => {
              if (runStr !== "") {
                ctx.fillStyle = runCol;
                ctx.fillText(runStr, runX, y);
                runStr = "";
              }
            };

            for (let c = 0; c < cols; c++) {
              const tr = topRowF[c];
              let ch, col;

              if (r >= waterRow) {
                /* WATER: animated wave texture, darker with depth */
                const depth = r - waterRow;
                const wv = Math.sin(time * 0.12 + c * 0.4);
                const wn = vnoise(c + offset * 0.5, r * 0.5 + time * 0.03);
                ch = wn > 0.55 ? "≈" : wv > 0.3 ? "~" : "-";
                const shade = 1 - Math.min(depth / (rows * 0.5), 1) * 0.4;
                col = hex(scaleC([25, 80, 150], shade * light));
              } else if (r < tr) {
                /* SKY: parallax clouds + stars + sun/moon (spaces reveal the gradient) */
                const cd = fbm((c + offset * 0.45) * 0.02, r * 0.08, 3, 2, 0.5); // slower x -> parallax
                if (cd > 0.52) {
                  const a = (cd - 0.5) / 0.5;
                  const ci = clamp(
                    Math.floor(a * CLOUD_RAMP.length),
                    0,
                    CLOUD_RAMP.length - 1,
                  );
                  ch = CLOUD_RAMP[ci];
                  const g = 210 + 45 * a;
                  col = hex([g * light, g * light, (g + 10) * light]);
                } else if (daylight < 0.5 && hash2(c, r) > 0.997) {
                  ch = "*";
                  col = hex([200, 210, 255]);
                } else {
                  ch = " ";
                  col = hex(skyHor); // matches gradient; space stays transparent
                }
                if (sunVis && c === sunC && r === sunR) {
                  ch = "@";
                  col = hex([255, 232, 120]);
                } else if (moonVis && c === moonC && r === moonR) {
                  ch = "O";
                  col = hex([220, 226, 245]);
                }
              } else {
                /* LAND: density ramp by depth, colour band by elevation */
                const d = r - tr;
                const li = clamp(
                  Math.floor(d / (rows * 0.05)),
                  0,
                  LAND_RAMP.length - 1,
                );
                ch = LAND_RAMP[li];
                const e = elev[c];
                let base;
                if (e > 0.9)
                  base = [235, 240, 248]; // snow
                else if (e > 0.78)
                  base = [150, 152, 165]; // rock
                else if (e > 0.64)
                  base = [120, 95, 70]; // soil
                else base = [70, 130, 70]; // grass
                const shade = 1 - Math.min(d / (rows * 0.5), 1) * 0.45;
                col = hex(scaleC(base, shade * light));
              }

              if (col !== runCol) {
                flush();
                runCol = col;
                runX = c * charW;
                runStr = ch;
              } else {
                runStr += ch;
              }
            }
            flush();
          }
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
