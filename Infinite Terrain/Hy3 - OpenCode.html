<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Infinite Terrain</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    height: 100%;
  }
  #scene {
    font-family: "Courier New", Consolas, monospace;
    font-weight: bold;
    line-height: 1.0;
    letter-spacing: 0;
    white-space: pre;
    display: block;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-shadow: 0 0 4px currentColor;
  }
</style>
</head>
<body>
<pre id="scene"></pre>
<script>
(() => {
  "use strict";

  // ---- Grid configuration -------------------------------------------------
  const COLS = 120;
  const ROWS = 48;
  const scene = document.getElementById("scene");

  // Density ramp from empty (sky/water) to solid (mountain peaks).
  const RAMP = " .:-=+*#%@";

  // ---- Hash-based value noise (from scratch) ------------------------------
  // A deterministic pseudo-random value in [0,1) for any integer lattice point.
  function hash(x, y) {
    let h = x * 374761393 + y * 668265263; // large primes
    h = (h ^ (h >> 13)) * 1274126177;
    h = h ^ (h >> 16);
    // map to [0,1)
    return ((h >>> 0) % 100000) / 100000;
  }

  // Smoothstep interpolation curve for C2 continuity.
  function smooth(t) {
    return t * t * (3 - 2 * t);
  }

  // Value noise: bilinear interpolation between hashed lattice corners.
  function valueNoise(x, y) {
    const xi = Math.floor(x);
    const yi = Math.floor(y);
    const xf = x - xi;
    const yf = y - yi;
    const v00 = hash(xi,     yi);
    const v10 = hash(xi + 1, yi);
    const v01 = hash(xi,     yi + 1);
    const v11 = hash(xi + 1, yi + 1);
    const u = smooth(xf);
    const v = smooth(yf);
    const top = v00 + (v10 - v00) * u;
    const bot = v01 + (v11 - v01) * u;
    return top + (bot - top) * v;
  }

  // Fractal Brownian motion: stack octaves of noise for natural detail.
  function fbm(x, y, octaves) {
    let amp = 0.5;
    let freq = 1.0;
    let sum = 0;
    let norm = 0;
    for (let o = 0; o < octaves; o++) {
      sum += amp * valueNoise(x * freq, y * freq);
      norm += amp;
      amp *= 0.5;
      freq *= 2.0;
    }
    return sum / norm;
  }

  // ---- Day/night color cycle ---------------------------------------------
  // Returns an RGB color for a given elevation band and time-of-day phase.
  function skyColor(phase) {
    // phase in [0,1): 0=midnight, 0.25=sunrise, 0.5=noon, 0.75=sunset
    const t = phase;
    // interpolate between night, dawn, day, dusk
    const stops = [
      [10, 12, 40],   // night
      [60, 40, 70],   // dawn
      [40, 90, 160],  // day
      [70, 45, 60],   // dusk
    ];
    const seg = t * 4;
    const i = Math.floor(seg) % 4;
    const j = (i + 1) % 4;
    const f = seg - Math.floor(seg);
    return [
      Math.round(stops[i][0] + (stops[j][0] - stops[i][0]) * f),
      Math.round(stops[i][1] + (stops[j][1] - stops[i][1]) * f),
      Math.round(stops[i][2] + (stops[j][2] - stops[i][2]) * f),
    ];
  }

  // ---- Main render loop ---------------------------------------------------
  const NOISE_SCALE = 0.06;   // horizontal terrain frequency
  const VERT_SCALE  = 0.10;   // vertical terrain frequency
  const CLOUD_SCALE = 0.04;   // cloud frequency
  const SCROLL_SPEED = 0.9;   // terrain scroll (cells/sec)
  const CLOUD_SPEED  = 0.35;  // cloud parallax scroll (cells/sec)
  const DAY_SPEED    = 0.02;  // day/night cycle (cycles/sec)

  let last = performance.now();
  let tScroll = 0;   // accumulated terrain offset (can grow unbounded)
  let tCloud  = 0;
  let tDay    = 0;

  function frame(now) {
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    tScroll += dt * SCROLL_SPEED;
    tCloud  += dt * CLOUD_SPEED;
    tDay    += dt * DAY_SPEED;

    const phase = (tDay % 1 + 1) % 1;
    const sky = skyColor(phase);
    // sun elevation: bright at noon, dark at midnight
    const sun = Math.max(0, Math.sin(phase * Math.PI * 2 - Math.PI / 2));
    const ambient = 0.25 + 0.75 * sun;

    const lines = new Array(ROWS);

    for (let r = 0; r < ROWS; r++) {
      const ny = r * VERT_SCALE;
      const horizon = (r / ROWS);
      const isSky = r < ROWS * 0.45;

      // Accumulate runs of identical color to minimize DOM nodes per frame.
      let row = "";
      let runCol = null;
      let runStr = "";

      const flush = () => {
        if (runStr.length === 0) return;
        row += `<span style="color:rgb(${runCol[0]},${runCol[1]},${runCol[2]})">${runStr}</span>`;
        runStr = "";
      };

      for (let c = 0; c < COLS; c++) {
        const wx = (c + tScroll) * NOISE_SCALE;
        const base = fbm(wx, ny, 5);
        let elev = base * 0.8 + (0.5 - horizon) * 0.6;

        const cwx = (c + tCloud) * CLOUD_SCALE;
        const cloud = fbm(cwx + 100, ny * 0.5 + 50, 3);

        let ch, col;
        if (isSky) {
          if (cloud > 0.62) {
            const d = Math.min(RAMP.length - 1, Math.floor((cloud - 0.62) / 0.04) + 1);
            ch = RAMP[d];
            col = [Math.round(sky[0] * 1.4), Math.round(sky[1] * 1.4), Math.round(sky[2] * 1.4)];
          } else {
            ch = " ";
            col = sky;
          }
        } else {
          if (elev < 0.30) {
            ch = "~";
            col = [20, 60 + Math.floor(40 * sun), 120 + Math.floor(60 * sun)];
          } else {
            const d = Math.min(RAMP.length - 1, Math.floor((elev - 0.30) / 0.7 * (RAMP.length - 1)));
            ch = RAMP[d];
            const shade = 0.4 + 0.6 * (elev - 0.30) / 0.7;
            const lit = shade * ambient;
            col = [
              Math.round(120 * lit + 40),
              Math.round(110 * lit + 30),
              Math.round(90 * lit + 20),
            ];
          }
        }

        // Compare color (quantized to ints) to decide whether to extend the run.
        const same = runCol &&
          runCol[0] === col[0] && runCol[1] === col[1] && runCol[2] === col[2];
        if (!same) {
          flush();
          runCol = col;
        }
        runStr += (ch === " ") ? " " : ch;
      }
      flush();
      lines[r] = row;
    }

    scene.innerHTML = lines.join("\n");
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
